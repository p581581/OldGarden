<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老園丁窯烤麵包 - 管理員登入</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌻</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8B4513;
            --primary-dark: #6b340f;
            --accent: #556B2F;
            --bg: #fdf6ec;
            --white: #fff;
            --text: #3a2a1a;
            --muted: #a08878;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Noto Serif TC", "Microsoft JhengHei", serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
            background: var(--bg);
        }

        /* ── 左側 Banner ── */
        .banner-panel {
            flex: 1;
            position: relative;
            background: #2c1a0e;
            overflow: hidden;
        }
        .banner-panel img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            display: block;
        }
        .banner-panel-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(0,0,0,0.08) 0%, rgba(44,26,14,0.55) 100%);
        }


        /* ── 右側登入 ── */
        .login-panel {
            width: 420px;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px 44px;
            overflow-y: auto;
            position: relative;
        }
        .login-panel::before {
            content: '';
            position: absolute;
            left: 0; top: 10%; bottom: 10%;
            width: 1px;
            background: linear-gradient(to bottom, transparent, #e0cbb8, transparent);
        }

        .login-box { width: 100%; max-width: 300px; }

        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-logo .emoji { font-size: 2.8rem; display: block; margin-bottom: 10px; }
        .login-logo h1 {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: 0.06em;
            margin-bottom: 4px;
        }
        .login-logo span {
            font-size: 0.8rem;
            color: var(--muted);
            letter-spacing: 0.1em;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e0cbb8;
        }
        .divider span { font-size: 0.75rem; color: var(--muted); white-space: nowrap; }

        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--muted);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 7px;
        }
        .form-group input {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid #e0cbb8;
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: inherit;
            color: var(--text);
            background: var(--white);
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-group input::placeholder { color: #c8b8a8; }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(139,69,19,0.1);
        }

        .btn-login {
            width: 100%;
            padding: 13px;
            background: var(--primary);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 700;
            font-family: inherit;
            letter-spacing: 0.06em;
            cursor: pointer;
            margin-top: 6px;
            transition: background 0.2s, transform 0.1s;
        }
        .btn-login:hover { background: var(--primary-dark); }
        .btn-login:active { transform: scale(0.98); }
        .btn-login:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

        .error-msg {
            display: none;
            margin-top: 14px;
            padding: 10px 14px;
            background: #fff0f0;
            border: 1px solid #fcc;
            border-radius: 7px;
            color: #c62828;
            font-size: 0.85rem;
            text-align: center;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 24px;
            color: var(--muted);
            font-size: 0.82rem;
            text-decoration: none;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--accent); }

        .login-footer {
            position: absolute;
            bottom: 24px;
            font-size: 0.72rem;
            color: #c8b8a8;
            letter-spacing: 0.04em;
        }

        /* ── 手機版 ── */
        @media (max-width: 700px) {
            .banner-panel { display: none; }
            body { background: var(--bg); }
            .login-panel {
                width: 100%;
                padding: 40px 28px;
            }
            .login-panel::before { display: none; }
        }
    </style>
</head>
<body>

<div class="banner-panel" id="bannerPanel">
    <div class="banner-panel-overlay"></div>
</div>

<div class="login-panel">
    <div class="login-box">
        <div class="login-logo">
            <span class="emoji">🌻</span>
            <h1>老園丁窯烤麵包</h1>
            <span>後台管理系統</span>
        </div>

        <div class="divider"><span>管理員登入</span></div>

        <div class="form-group">
            <label for="username">帳號</label>
            <input type="text" id="username" placeholder="請輸入帳號" autocomplete="username">
        </div>
        <div class="form-group">
            <label for="password">密碼</label>
            <input type="password" id="password" placeholder="請輸入密碼" autocomplete="current-password">
        </div>

        <button class="btn-login" id="loginBtn" onclick="login()">登入</button>
        <div class="error-msg" id="errorMsg">帳號或密碼錯誤，請再試一次。</div>

        <a href="/" class="back-link">← 回到訂購頁面</a>
    </div>
    <p class="login-footer">© 老園丁窯烤麵包</p>
</div>

<script>
    // 載入 Banner
    (async () => {
        try {
            const res = await fetch('/api/banner');
            const { url } = await res.json();
            if (url) {
                const panel = document.getElementById('bannerPanel');
                const img = document.createElement('img');
                img.src = url;
                img.alt = '';
                panel.insertBefore(img, panel.firstChild);
            }
        } catch {}
    })();

    // 已登入則直接跳轉
    const token = localStorage.getItem('admin_token');
    const exp = localStorage.getItem('admin_token_exp');
    if (token && exp && Date.now() < parseInt(exp, 10)) {
        window.location.href = '/admin.html';
    }

    // Enter 鍵觸發登入
    document.getElementById('password').addEventListener('keydown', e => {
        if (e.key === 'Enter') login();
    });

    async function login() {
        const user = document.getElementById('username').value.trim();
        const pass = document.getElementById('password').value;
        const btn = document.getElementById('loginBtn');
        const errEl = document.getElementById('errorMsg');

        if (!user || !pass) return;

        btn.disabled = true;
        btn.textContent = '驗證中...';
        errEl.style.display = 'none';

        try {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user, pass }),
            });

            if (res.ok) {
                const { token } = await res.json();
                localStorage.setItem('admin_token', token);
                localStorage.setItem('admin_token_exp', String(Date.now() + 72 * 60 * 60 * 1000));
                window.location.href = '/admin.html';
            } else {
                errEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = '登入';
            }
        } catch {
            errEl.textContent = '連線失敗，請檢查網路後再試。';
            errEl.style.display = 'block';
            btn.disabled = false;
            btn.textContent = '登入';
        }
    }
</script>

</body>
</html>
