<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老園丁窯烤麵包 - 商品管理</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌻</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-color: #8B4513;
            --accent-color: #556B2F;
            --bg-color: #FDF5E6;
            --text-color: #333;
            --white: #fff;
            --danger: #d32f2f;
        }
        body {
            font-family: "Microsoft JhengHei", "Heiti TC", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 0;
            line-height: 1.6;
        }
        header {
            background-color: var(--primary-color);
            color: var(--white);
            padding: 1rem;
            text-align: center;
            position: sticky;
            top: 0; z-index: 100;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        header h1 { margin: 0; font-size: 1.5rem; }
        header p { margin: 5px 0 0; font-size: 0.9rem; opacity: 0.9; }
        .header-links { margin-top: 6px; display: flex; justify-content: center; gap: 16px; }
        .header-links a, .header-links button {
            color: var(--white);
            font-size: 0.85rem;
            background: none;
            border: none;
            text-decoration: underline;
            cursor: pointer;
        }

        /* Tabs */
        .tabs {
            display: flex;
            background: #f5e8d5;
            border-bottom: 2px solid var(--primary-color);
        }
        .tab-btn {
            padding: 12px 28px;
            border: none;
            background: none;
            font-size: 1rem;
            cursor: pointer;
            color: #666;
            font-family: inherit;
        }
        .tab-btn.active {
            background: var(--white);
            color: var(--primary-color);
            font-weight: bold;
            border-bottom: 3px solid var(--primary-color);
            margin-bottom: -2px;
        }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        .container { max-width: 960px; margin: 0 auto; padding: 20px; }

        /* Toolbar */
        .toolbar {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 16px;
        }

        /* Buttons */
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 0.95rem; font-weight: bold; font-family: inherit; }
        .btn-primary { background-color: var(--accent-color); color: var(--white); }
        .btn-primary:hover { background-color: #435525; }
        .btn-danger { background-color: var(--danger); color: var(--white); }
        .btn-danger:hover { background-color: #b71c1c; }
        .btn-save { background-color: var(--primary-color); color: var(--white); }
        .btn-save:hover { background-color: #6d360e; }
        .btn-back {
            background: none;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            padding: 8px 16px;
        }
        .btn-back:hover { background: #f5e8d5; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Search */
        .search-input {
            padding: 9px 14px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 0.95rem;
            font-family: inherit;
            flex: 1;
            min-width: 0;
            box-sizing: border-box;
        }
        .search-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(139,69,19,0.15);
        }

        /* ── Product Grid ───────────────────────────────────── */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 16px;
        }
        .grid-card {
            background: var(--white);
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            cursor: pointer;
            overflow: hidden;
            transition: transform 0.15s, box-shadow 0.15s;
            display: flex;
            flex-direction: column;
        }
        .grid-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 16px rgba(0,0,0,0.15);
        }
        .grid-card-img {
            width: 100%;
            aspect-ratio: 3 / 2;
            background: #f0e8d8;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: #999;
            font-size: 0.85rem;
            text-align: center;
            padding: 8px;
            box-sizing: border-box;
        }
        .grid-card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .grid-card-body {
            padding: 10px 12px 12px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .grid-card-name {
            font-weight: bold;
            font-size: 0.95rem;
            color: var(--text-color);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .grid-card-price {
            font-size: 0.85rem;
            color: var(--primary-color);
            font-weight: bold;
        }
        .grid-card-weight {
            font-size: 0.78rem;
            color: #888;
        }
        .grid-add-card {
            background: #f5f5f5;
            border: 2px dashed #ccc;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            aspect-ratio: 3 / 2;
            color: #aaa;
            font-size: 2rem;
            transition: background 0.15s, border-color 0.15s;
            min-height: 120px;
        }
        .grid-add-card:hover {
            background: #eee;
            border-color: var(--accent-color);
            color: var(--accent-color);
        }
        .grid-add-label {
            font-size: 0.85rem;
            margin-top: 6px;
        }

        /* ── Detail View ────────────────────────────────────── */
        .detail-toolbar-title {
            flex: 1;
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--primary-color);
            text-align: center;
            min-width: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .detail-panel {
            background: var(--white);
            border-radius: 10px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .form-row.full { grid-template-columns: 1fr; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-weight: bold; margin-bottom: 5px; font-size: 0.9rem; color: #555; }
        .form-group input, .form-group textarea {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1rem;
            font-family: inherit;
            box-sizing: border-box;
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(139,69,19,0.15);
        }
        .form-group textarea { resize: vertical; min-height: 60px; }

        .image-section { display: flex; gap: 15px; align-items: flex-start; margin-bottom: 20px; }
        .image-preview {
            width: 140px; height: 140px;
            border: 2px dashed #ccc;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            color: #999; font-size: 0.85rem; text-align: center;
            overflow: hidden; flex-shrink: 0; background: #f9f9f9;
        }
        .image-preview img { width: 100%; height: 100%; object-fit: cover; }
        .image-controls { display: flex; flex-direction: column; gap: 8px; flex: 1; }
        .image-controls input[type="file"] { font-size: 0.9rem; }
        .upload-progress { font-size: 0.85rem; color: #666; }

        .detail-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 8px;
        }

        .loading { text-align: center; padding: 60px 20px; color: #999; font-size: 1.1rem; }
        .empty-state { text-align: center; padding: 60px 20px; color: #999; }

        /* Scroll to top */
        .scroll-top {
            position: fixed;
            bottom: 70px;
            right: 20px;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background-color: var(--primary-color);
            color: var(--white);
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            z-index: 999;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.3s, transform 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .scroll-top.show { opacity: 1; transform: translateY(0); }
        .scroll-top:hover { background-color: #6d360e; }

        /* Toast */
        .toast {
            position: fixed; bottom: 20px; right: 20px;
            padding: 12px 24px; border-radius: 8px;
            color: var(--white); font-weight: bold;
            z-index: 1000; opacity: 0; transition: opacity 0.3s; max-width: 350px;
        }
        .toast.show { opacity: 1; }
        .toast.success { background-color: var(--accent-color); }
        .toast.error { background-color: var(--danger); }

        /* Stats */
        .stats-filters {
            background: var(--white);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: flex-end;
        }
        .stats-filters .form-group { flex: 1; min-width: 140px; }
        .stats-filters label { font-weight: bold; font-size: 0.9rem; color: #555; display: block; margin-bottom: 4px; }
        .stats-filters input, .stats-filters select {
            padding: 8px 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 0.95rem;
            width: 100%;
            box-sizing: border-box;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .chart-card {
            background: var(--white);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .chart-card h3 { margin: 0 0 16px; color: var(--primary-color); font-size: 1rem; }

        @media (max-width: 700px) {
            .form-row { grid-template-columns: 1fr; }
            .image-section { flex-direction: column; }
            .image-preview { width: 100%; height: 150px; }
            .charts-grid { grid-template-columns: 1fr; }
            .product-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
        }
    </style>
</head>
<body>

<header>
    <h1>🌻 老園丁窯烤麵包 - 後台管理</h1>
    <div class="header-links">
        <a href="/">← 回到訂購頁面</a>
        <button onclick="logout()">登出</button>
    </div>
</header>

<div class="tabs">
    <button class="tab-btn active" onclick="switchTab('products')">商品管理</button>
    <button class="tab-btn" onclick="switchTab('stats')">統計報表</button>
</div>

<!-- 商品管理 Tab -->
<div id="tab-products" class="tab-panel active">
    <div class="container">
        <div class="toolbar" id="toolbar">
            <h2 style="margin:0">商品列表</h2>
            <input class="search-input" type="text" id="searchInput" placeholder="搜尋商品名稱..." oninput="searchProducts()">
            <button class="btn btn-primary" onclick="addProduct()">+ 新增商品</button>
        </div>
        <div id="productList">
            <div class="loading">載入中...</div>
        </div>
    </div>
</div>

<!-- 統計報表 Tab -->
<div id="tab-stats" class="tab-panel">
    <div class="container">
        <h2>訂單統計報表</h2>
        <div class="stats-filters">
            <div class="form-group">
                <label>開始日期</label>
                <input type="date" id="statsStart">
            </div>
            <div class="form-group">
                <label>結束日期</label>
                <input type="date" id="statsEnd">
            </div>
            <div class="form-group">
                <label>商品類別</label>
                <select id="statsProduct">
                    <option value="">全部商品</option>
                </select>
            </div>
            <div class="form-group" style="flex: 0;">
                <label>&nbsp;</label>
                <button class="btn btn-primary" onclick="loadStats()">套用篩選</button>
            </div>
        </div>

        <div class="charts-grid">
            <div class="chart-card">
                <h3>各商品訂購佔比</h3>
                <canvas id="pieChart"></canvas>
            </div>
            <div class="chart-card">
                <h3>訂購趨勢</h3>
                <canvas id="lineChart"></canvas>
            </div>
        </div>
    </div>
</div>

<button class="scroll-top" id="scrollTopBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="回到頂部">↑</button>
<div class="toast" id="toast"></div>

<script>
    let products = [];
    let currentView = 'grid';   // 'grid' | 'detail'
    let selectedProductId = null;
    let pieChartInstance = null;
    let lineChartInstance = null;

    // ── Auth ────────────────────────────────────────────────
    function getToken() {
        const token = localStorage.getItem('admin_token');
        const exp = localStorage.getItem('admin_token_exp');
        if (!token || !exp || Date.now() > parseInt(exp, 10)) {
            window.location.href = '/login.html';
            return null;
        }
        return token;
    }

    function authHeaders() {
        const token = getToken();
        if (!token) return {};
        return {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json',
        };
    }

    function logout() {
        localStorage.removeItem('admin_token');
        localStorage.removeItem('admin_token_exp');
        window.location.href = '/login.html';
    }

    // ── Tabs ────────────────────────────────────────────────
    function switchTab(name) {
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`tab-${name}`).classList.add('active');
        event.currentTarget.classList.add('active');
        if (name === 'stats') initStats();
    }

    // ── Toast ───────────────────────────────────────────────
    function showToast(message, type = 'success') {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.className = `toast ${type} show`;
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // ── Helpers ─────────────────────────────────────────────
    function escapeHtml(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    function getImgSrc(p) {
        return p.imagePath || p.url || null;
    }

    // ── Toolbar ─────────────────────────────────────────────
    function setGridToolbar() {
        document.getElementById('toolbar').innerHTML = `
            <h2 style="margin:0">商品列表</h2>
            <input class="search-input" type="text" id="searchInput" placeholder="搜尋商品名稱..." oninput="searchProducts()">
            <button class="btn btn-primary" onclick="addProduct()">+ 新增商品</button>
        `;
    }

    function setDetailToolbar(product) {
        document.getElementById('toolbar').innerHTML = `
            <button class="btn btn-back" onclick="backToGrid()">← 返回</button>
            <span class="detail-toolbar-title">${escapeHtml(product.name)}</span>
            <button class="btn btn-danger" onclick="deleteProduct(${product.id})">刪除商品</button>
        `;
    }

    // ── Products: Grid View ──────────────────────────────────
    async function loadProducts() {
        try {
            const res = await fetch('/api/products');
            products = await res.json();
            renderGrid();
        } catch {
            document.getElementById('productList').innerHTML =
                '<div class="empty-state">無法載入商品資料，請重新整理頁面。</div>';
        }
    }

    function searchProducts() {
        const q = document.getElementById('searchInput').value.trim().toLowerCase();
        const filtered = q ? products.filter(p => p.name.toLowerCase().includes(q)) : products;
        renderGrid(filtered);
    }

    function renderGrid(list = products) {
        currentView = 'grid';
        selectedProductId = null;
        setGridToolbar();

        const container = document.getElementById('productList');
        if (list.length === 0 && products.length > 0) {
            container.innerHTML = '<div class="empty-state">找不到符合的商品。</div>';
            return;
        }

        const cards = list.map(p => {
            const src = getImgSrc(p);
            const imgHtml = src
                ? `<img src="${escapeHtml(src)}" alt="${escapeHtml(p.name)}">`
                : escapeHtml(p.name);
            return `
                <div class="grid-card" onclick="showDetail(${p.id})" title="${escapeHtml(p.name)}">
                    <div class="grid-card-img">${imgHtml}</div>
                    <div class="grid-card-body">
                        <div class="grid-card-name">${escapeHtml(p.name)}</div>
                        <div class="grid-card-price">NT$ ${p.price}</div>
                        ${p.weight ? `<div class="grid-card-weight">${escapeHtml(p.weight)}</div>` : ''}
                    </div>
                </div>
            `;
        }).join('');

        const addCard = `
            <div class="grid-add-card" onclick="addProduct()" title="新增商品">
                <span>+</span>
                <span class="grid-add-label">新增商品</span>
            </div>
        `;

        container.innerHTML = `<div class="product-grid">${cards}${addCard}</div>`;
    }

    // ── Products: Detail View ────────────────────────────────
    function showDetail(productId) {
        const product = products.find(p => p.id === productId);
        if (!product) return;

        currentView = 'detail';
        selectedProductId = productId;
        setDetailToolbar(product);

        const src = getImgSrc(product);
        const previewHtml = src
            ? `<img src="${escapeHtml(src)}" alt="${escapeHtml(product.name)}">`
            : '尚無圖片';

        document.getElementById('productList').innerHTML = `
            <div class="detail-panel">
                <div class="image-section">
                    <div class="image-preview" id="preview-${product.id}">${previewHtml}</div>
                    <div class="image-controls">
                        <label style="font-weight:bold;font-size:0.9rem;color:#555;">上傳圖片至 Blob（最大 5MB）</label>
                        <input type="file" accept="image/*" onchange="uploadImage(${product.id}, this)">
                        <div class="upload-progress" id="progress-${product.id}"></div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>商品名稱</label>
                        <input type="text" id="name-${product.id}" value="${escapeHtml(product.name)}">
                    </div>
                    <div class="form-group">
                        <label>重量</label>
                        <input type="text" id="weight-${product.id}" value="${escapeHtml(product.weight)}">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>價格 (NT$)</label>
                        <input type="number" id="price-${product.id}" value="${product.price}" min="0">
                    </div>
                    <div class="form-group">
                        <label>外部圖片網址 (備用)</label>
                        <input type="text" id="url-${product.id}" value="${escapeHtml(product.url || '')}" placeholder="https://...">
                    </div>
                </div>

                <div class="form-row full">
                    <div class="form-group">
                        <label>商品描述</label>
                        <textarea id="desc-${product.id}">${escapeHtml(product.desc)}</textarea>
                    </div>
                </div>

                <input type="hidden" id="imagePath-${product.id}" value="${escapeHtml(product.imagePath || '')}">

                <div class="detail-actions">
                    <button class="btn btn-save" onclick="saveProduct(${product.id})">儲存變更</button>
                </div>
            </div>
        `;

        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function backToGrid() {
        renderGrid();
    }

    // ── Upload ───────────────────────────────────────────────
    async function uploadImage(productId, fileInput) {
        const file = fileInput.files[0];
        if (!file) return;
        if (file.size > 5 * 1024 * 1024) {
            showToast('圖片檔案過大，請選擇 5MB 以下的檔案。', 'error');
            return;
        }
        const progressEl = document.getElementById(`progress-${productId}`);
        progressEl.textContent = '上傳中...';
        try {
            const formData = new FormData();
            formData.append('image', file);
            const token = getToken();
            if (!token) return;
            const res = await fetch('/api/upload', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` },
                body: formData,
            });
            if (!res.ok) throw new Error('Upload failed');
            const { url } = await res.json();

            document.getElementById(`preview-${productId}`).innerHTML = `<img src="${url}" alt="商品圖片">`;
            document.getElementById(`imagePath-${productId}`).value = url;
            const product = products.find(p => p.id === productId);
            if (product) product.imagePath = url;

            progressEl.textContent = '✓ 圖片已選取，請點擊「儲存變更」完成連結';
            showToast('圖片上傳完成，請記得點擊儲存變更！');
        } catch {
            progressEl.textContent = '上傳失敗，請重試。';
            showToast('圖片上傳失敗，請重試。', 'error');
        }
    }

    // ── Save ─────────────────────────────────────────────────
    async function saveProduct(productId) {
        const name = document.getElementById(`name-${productId}`).value.trim();
        const weight = document.getElementById(`weight-${productId}`).value.trim();
        const price = document.getElementById(`price-${productId}`).value;
        const desc = document.getElementById(`desc-${productId}`).value.trim();
        const url = document.getElementById(`url-${productId}`).value.trim();

        if (!name) { showToast('商品名稱不可為空。', 'error'); return; }

        const imagePath = document.getElementById(`imagePath-${productId}`)?.value || '';

        try {
            const res = await fetch(`/api/products/${productId}`, {
                method: 'PUT',
                headers: authHeaders(),
                body: JSON.stringify({ name, weight, price: Number(price), desc, url, imagePath }),
            });
            if (!res.ok) throw new Error('Save failed');
            const updated = await res.json();
            const idx = products.findIndex(p => p.id === productId);
            if (idx !== -1) products[idx] = updated;

            showToast('儲存成功！');
            renderGrid();
        } catch {
            showToast('儲存失敗，請重試。', 'error');
        }
    }

    // ── Add ──────────────────────────────────────────────────
    async function addProduct() {
        try {
            const res = await fetch('/api/products', {
                method: 'POST',
                headers: authHeaders(),
                body: JSON.stringify({ name: '新商品', weight: '', price: 0, desc: '', url: '', imagePath: '' }),
            });
            if (!res.ok) throw new Error('Create failed');
            const newProduct = await res.json();
            products.push(newProduct);
            showDetail(newProduct.id);
            showToast('新商品已建立，請填寫並儲存商品資料！');
        } catch {
            showToast('新增商品失敗，請重試。', 'error');
        }
    }

    // ── Delete ───────────────────────────────────────────────
    async function deleteProduct(productId) {
        const product = products.find(p => p.id === productId);
        const name = product ? product.name : `#${productId}`;
        if (!confirm(`確定要刪除「${name}」嗎？此操作無法復原。`)) return;
        try {
            const res = await fetch(`/api/products/${productId}`, {
                method: 'DELETE',
                headers: authHeaders(),
            });
            if (!res.ok) throw new Error('Delete failed');
            products = products.filter(p => p.id !== productId);
            renderGrid();
            showToast('商品已刪除。');
        } catch {
            showToast('刪除失敗，請重試。', 'error');
        }
    }

    // ── Stats ───────────────────────────────────────────────
    function getDefaultDates() {
        const now = new Date();
        const start = new Date(now.getFullYear(), now.getMonth(), 1);
        return {
            start: start.toISOString().slice(0, 10),
            end: now.toISOString().slice(0, 10),
        };
    }

    function initStats() {
        const { start, end } = getDefaultDates();
        const startEl = document.getElementById('statsStart');
        const endEl = document.getElementById('statsEnd');
        if (!startEl.value) startEl.value = start;
        if (!endEl.value) endEl.value = end;

        const select = document.getElementById('statsProduct');
        const existingNames = [...select.options].map(o => o.value);
        products.forEach(p => {
            if (!existingNames.includes(p.name)) {
                const opt = document.createElement('option');
                opt.value = p.name;
                opt.textContent = p.name;
                select.appendChild(opt);
            }
        });

        loadStats();
    }

    async function loadStats() {
        const startDate = document.getElementById('statsStart').value;
        const endDate = document.getElementById('statsEnd').value;
        const product = document.getElementById('statsProduct').value;

        const params = new URLSearchParams();
        if (startDate) params.set('startDate', startDate);
        if (endDate) params.set('endDate', endDate);
        if (product) params.set('product', product);

        try {
            const res = await fetch(`/api/stats?${params}`, { headers: authHeaders() });
            if (!res.ok) throw new Error('Failed');
            const logs = await res.json();
            renderCharts(logs);
        } catch {
            showToast('載入統計資料失敗。', 'error');
        }
    }

    function renderCharts(logs) {
        const pieAgg = {};
        const lineAgg = {};

        logs.forEach(log => {
            log.items.forEach(item => {
                pieAgg[item.name] = (pieAgg[item.name] || 0) + (item.qty || 0);
            });
            const totalQty = log.items.reduce((s, i) => s + (i.qty || 0), 0);
            lineAgg[log.date] = lineAgg[log.date] || { qty: 0, amount: 0 };
            lineAgg[log.date].qty += totalQty;
            lineAgg[log.date].amount += log.total || 0;
        });

        const pieLabels = Object.keys(pieAgg);
        const pieValues = Object.values(pieAgg);
        const pieColors = ['#8B4513','#556B2F','#DAA520','#CD853F','#6B8E23','#A0522D','#BDB76B'];

        if (pieChartInstance) pieChartInstance.destroy();
        pieChartInstance = new Chart(document.getElementById('pieChart'), {
            type: 'pie',
            data: {
                labels: pieLabels,
                datasets: [{ data: pieValues, backgroundColor: pieColors.slice(0, pieLabels.length) }],
            },
            options: {
                plugins: {
                    legend: { position: 'bottom' },
                    tooltip: {
                        callbacks: {
                            label: ctx => ` ${ctx.label}: ${ctx.parsed} 個`,
                        },
                    },
                },
            },
        });

        const sortedDates = Object.keys(lineAgg).sort();
        const lineQty = sortedDates.map(d => lineAgg[d].qty);
        const lineAmount = sortedDates.map(d => lineAgg[d].amount);

        if (lineChartInstance) lineChartInstance.destroy();
        lineChartInstance = new Chart(document.getElementById('lineChart'), {
            type: 'line',
            data: {
                labels: sortedDates,
                datasets: [
                    {
                        label: '訂購數量',
                        data: lineQty,
                        borderColor: '#8B4513',
                        backgroundColor: 'rgba(139,69,19,0.1)',
                        yAxisID: 'yQty',
                        tension: 0.3,
                    },
                    {
                        label: '訂購金額',
                        data: lineAmount,
                        borderColor: '#556B2F',
                        backgroundColor: 'rgba(85,107,47,0.1)',
                        yAxisID: 'yAmount',
                        tension: 0.3,
                    },
                ],
            },
            options: {
                scales: {
                    yQty: { type: 'linear', position: 'left', title: { display: true, text: '數量' } },
                    yAmount: { type: 'linear', position: 'right', title: { display: true, text: '金額 (NT$)' }, grid: { drawOnChartArea: false } },
                },
                plugins: { legend: { position: 'bottom' } },
            },
        });
    }

    // ── Init ────────────────────────────────────────────────
    getToken();
    loadProducts();

    window.addEventListener('scroll', () => {
        document.getElementById('scrollTopBtn').classList.toggle('show', window.scrollY > 300);
    });
</script>

</body>
</html>
